<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account · Vigilo</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4F2EE;--paper50:#FBF9F4;
    --ink:#14110C;--ink700:#332E26;--ink600:#544D42;--ink500:#7A7263;--ink400:#9F9685;
    --night:#0D1015;--night2:#13171D;--night-muted:#9CA3B0;
    --amber:#E8590C;--green:#00A56F;--red:#C92A2A;--yellow:#E4B514;
    --rule:rgba(20,17,12,.10);--rule-strong:rgba(20,17,12,.16);
    --rule-dark:rgba(255,255,255,.08);
    --sans:'Geist',ui-sans-serif,system-ui,-apple-system,sans-serif;
    --mono:'Geist Mono',ui-monospace,Menlo,monospace;
    --card-shadow:0 1px 0 rgba(20,17,12,.04),0 8px 24px -8px rgba(20,17,12,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--night);font:400 14px/1.55 var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  input,select,textarea,button{font:inherit}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:4px}

  /* ── Layout ── */
  .shell{display:flex;height:100vh;overflow:hidden}

  /* Sidebar */
  .sidebar{width:240px;flex-shrink:0;background:var(--night);display:flex;flex-direction:column;
    border-right:1px solid var(--rule-dark);overflow-y:auto}
  .sb-brand{display:flex;align-items:center;gap:10px;padding:22px 20px 18px;
    font-weight:700;font-size:16px;letter-spacing:-.02em;color:#fff;border-bottom:1px solid var(--rule-dark)}
  .sb-brand svg{display:block;flex-shrink:0}
  .sb-nav{padding:12px 10px;flex:1}
  .sb-sec{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:rgba(255,255,255,.3);padding:16px 10px 6px;margin-top:4px}
  .sb-sec:first-child{padding-top:6px}
  .sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;
    cursor:pointer;color:rgba(255,255,255,.6);font-size:13.5px;font-weight:500;
    transition:background .15s,color .15s;user-select:none;border:none;background:none;width:100%;text-align:left}
  .sb-item svg{flex-shrink:0;opacity:.7}
  .sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .sb-item.active{background:rgba(232,89,12,.15);color:var(--amber)}
  .sb-item.active svg{opacity:1}
  .sb-foot{padding:16px 20px;border-top:1px solid var(--rule-dark)}
  .sb-user{font-size:12px;color:var(--night-muted);line-height:1.4;word-break:break-all;margin-bottom:10px}
  .sb-user b{color:rgba(255,255,255,.8);display:block;font-weight:600}
  .btn-out{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;
    color:var(--night-muted);background:none;border:1px solid var(--rule-dark);
    border-radius:8px;padding:7px 12px;cursor:pointer;width:100%;transition:color .15s,border-color .15s}
  .btn-out:hover{color:#fff;border-color:rgba(255,255,255,.2)}

  /* Main */
  .main{flex:1;overflow-y:auto;background:var(--paper)}
  .main-hd{position:sticky;top:0;z-index:10;background:rgba(244,242,238,.9);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--rule);
    padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between}
  .main-hd h1{font-size:16px;font-weight:700;letter-spacing:-.02em}
  .main-body{padding:28px 32px;max-width:960px}

  /* Cards */
  .card{background:#fff;border-radius:14px;box-shadow:var(--card-shadow);padding:22px 24px;margin-bottom:16px}
  .card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .card-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink500)}

  /* Stats grid */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:16px}
  .stat{background:#fff;border-radius:12px;box-shadow:var(--card-shadow);padding:18px 20px}
  .stat-val{font-size:28px;font-weight:700;letter-spacing:-.03em;line-height:1}
  .stat-lbl{font-size:11.5px;color:var(--ink500);margin-top:5px}
  .stat-bar{height:4px;border-radius:2px;background:var(--rule);margin-top:10px;overflow:hidden}
  .stat-fill{height:100%;border-radius:2px;background:var(--amber);transition:width .4s}

  /* Chips */
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{font-size:12px;font-weight:600;padding:4px 12px;border-radius:999px;
    background:var(--paper);border:1px solid var(--rule-strong);color:var(--ink700)}
  .chip.amber{background:rgba(232,89,12,.1);border-color:rgba(232,89,12,.25);color:var(--amber)}

  /* Pill badges */
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
    padding:3px 10px;border-radius:999px;letter-spacing:.04em;text-transform:uppercase}
  .pill-free{background:var(--paper);border:1px solid var(--rule-strong);color:var(--ink500)}
  .pill-pro{background:rgba(232,89,12,.12);border:1px solid rgba(232,89,12,.3);color:var(--amber)}
  .pill-green{background:rgba(0,165,111,.1);border:1px solid rgba(0,165,111,.25);color:var(--green)}
  .pill-red{background:rgba(201,42,42,.08);border:1px solid rgba(201,42,42,.2);color:var(--red)}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;font-weight:600;
    font-size:13.5px;padding:9px 16px;cursor:pointer;border:none;transition:background .16s,opacity .16s;line-height:1}
  .btn-amber{background:var(--amber);color:#fff}.btn-amber:hover{background:#FF6F1F}
  .btn-ghost{background:transparent;box-shadow:inset 0 0 0 1.5px var(--rule-strong);color:var(--ink700)}
  .btn-ghost:hover{background:rgba(20,17,12,.04)}
  .btn-sm{padding:7px 13px;font-size:12.5px;border-radius:8px}
  .btn-danger{background:rgba(201,42,42,.08);color:var(--red);box-shadow:inset 0 0 0 1px rgba(201,42,42,.2)}
  .btn-danger:hover{background:rgba(201,42,42,.14)}

  /* Key display */
  .key-box{display:flex;align-items:center;gap:10px;background:var(--paper50);
    border:1px solid var(--rule);border-radius:10px;padding:11px 14px;margin-top:10px}
  .key-val{flex:1;font-family:var(--mono);font-size:13px;color:var(--ink600);
    word-break:break-all;min-width:0}
  .key-copy{flex-shrink:0;font-size:12px;font-weight:700;padding:6px 12px;border-radius:7px;
    background:var(--amber);color:#fff;border:none;cursor:pointer;transition:background .15s}
  .key-copy:hover{background:#FF6F1F}
  .key-copy.done{background:var(--green)}

  /* Form elements */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink600);margin-bottom:5px}
  .field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--rule-strong);
    border-radius:9px;background:#fff;color:var(--ink);font-size:13.5px;
    transition:border-color .15s,box-shadow .15s;outline:none}
  .field input:focus,.field select:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(232,89,12,.12)}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* Table */
  .tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  .tbl th{text-align:left;padding:8px 10px;font-size:10.5px;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink500);border-bottom:1px solid var(--rule)}
  .tbl td{padding:11px 10px;border-bottom:1px solid var(--rule);vertical-align:middle}
  .tbl tr:last-child td{border-bottom:0}
  .tbl tr:hover td{background:var(--paper50)}

  /* Report cards */
  .rep-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin-top:14px}
  .rep-card{border:1px solid var(--rule);border-radius:12px;padding:20px;cursor:pointer;
    transition:border-color .2s,box-shadow .2s;position:relative}
  .rep-card:hover{border-color:var(--amber);box-shadow:0 0 0 3px rgba(232,89,12,.1)}
  .rep-card.selected{border-color:var(--amber);background:rgba(232,89,12,.04)}
  .rep-card input[type=radio]{position:absolute;opacity:0;pointer-events:none}
  .rep-card-ico{width:36px;height:36px;border-radius:9px;background:var(--paper);
    display:flex;align-items:center;justify-content:center;margin-bottom:12px;
    border:1px solid var(--rule)}
  .rep-card h3{font-size:14px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
  .rep-card p{font-size:12px;color:var(--ink500);line-height:1.55}
  .rep-price{margin-top:10px;font-size:13px;font-weight:700;color:var(--amber)}

  /* Activity feed */
  .activity{display:flex;flex-direction:column;gap:0}
  .act-row{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--rule)}
  .act-row:last-child{border-bottom:0}
  .act-ico{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;
    justify-content:center;margin-top:1px}
  .act-ico.amber{background:rgba(232,89,12,.12);color:var(--amber)}
  .act-ico.green{background:rgba(0,165,111,.1);color:var(--green)}
  .act-ico.muted{background:var(--paper);color:var(--ink400)}
  .act-body{flex:1;min-width:0}
  .act-title{font-size:13px;font-weight:600;color:var(--ink)}
  .act-sub{font-size:11.5px;color:var(--ink500);margin-top:1px}
  .act-time{font-size:11px;color:var(--ink400);flex-shrink:0;padding-top:2px}

  /* Team */
  .team-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--rule)}
  .team-row:last-child{border-bottom:0}
  .team-avatar{width:32px;height:32px;border-radius:50%;background:var(--paper);
    border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:var(--ink600);flex-shrink:0}
  .team-info{flex:1}
  .team-name{font-size:13.5px;font-weight:600}
  .team-email{font-size:11.5px;color:var(--ink500)}

  /* Auth view */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--night);padding:24px}
  .auth-box{width:100%;max-width:400px;background:var(--paper);border-radius:20px;padding:36px 32px}
  .auth-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;
    letter-spacing:-.02em;margin-bottom:28px}
  .auth-box h2{font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:8px}
  .auth-box p{font-size:14px;color:var(--ink600);margin-bottom:22px;line-height:1.55}
  .auth-input{width:100%;padding:12px 14px;border:1.5px solid var(--rule-strong);border-radius:10px;
    background:#fff;font-size:15px;outline:none;transition:border-color .15s}
  .auth-input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(232,89,12,.12)}
  .auth-btn{width:100%;margin-top:12px;padding:13px;border-radius:10px;
    background:var(--amber);color:#fff;font-size:15px;font-weight:700;
    border:none;cursor:pointer;transition:background .15s}
  .auth-btn:hover{background:#FF6F1F}
  .auth-msg{font-size:12.5px;margin-top:10px;text-align:center;min-height:18px}
  .auth-back{margin-top:20px;text-align:center;font-size:13px;color:var(--ink500)}
  .auth-back a{color:var(--amber);font-weight:600}

  /* Empty state */
  .empty{text-align:center;padding:32px 16px;color:var(--ink500);font-size:13.5px;line-height:1.6}
  .empty svg{display:block;margin:0 auto 12px;opacity:.35}

  /* Divider */
  .divider{height:1px;background:var(--rule);margin:20px 0}

  /* Msg */
  .msg{font-size:12.5px;padding:9px 12px;border-radius:8px;margin-top:10px}
  .msg-ok{background:rgba(0,165,111,.1);color:var(--green);border:1px solid rgba(0,165,111,.2)}
  .msg-err{background:rgba(201,42,42,.08);color:var(--red);border:1px solid rgba(201,42,42,.2)}

  /* Mobile */
  @media(max-width:760px){
    .sidebar{display:none}
    .main-body{padding:20px 18px}
    .field-row{grid-template-columns:1fr}
    .stats{grid-template-columns:1fr 1fr}
  }
  @media(min-width:761px){
    .mobile-nav{display:none}
  }
</style>

  plausible.init()
</script>

<body>

<div id="appRoot"></div>

<script>
(function(){
'use strict';

// ── Constants ─────────────────────────────────────────────
const FREE_ASSESS = 10;
const FREE_COUNTRIES = 3;
const COUNTRY_NAMES = {TR:'Turkey',TH:'Thailand',UA:'Ukraine',FR:'France',DE:'Germany',
  GB:'United Kingdom',US:'United States',AE:'UAE',IN:'India',CN:'China',PK:'Pakistan',
  EG:'Egypt',NG:'Nigeria',IL:'Israel',IR:'Iran',ES:'Spain',IT:'Italy',RU:'Russia',
  MX:'Mexico',BR:'Brazil',JP:'Japan',KR:'South Korea',ID:'Indonesia',SA:'Saudi Arabia'};
const BANDS = {minimal:'Minimal',low:'Low',moderate:'Moderate',elevated:'Elevated',severe:'Severe',critical:'Critical'};
const BAND_C = {minimal:'#5b9d6b',low:'#caa53d',moderate:'#e2820f',elevated:'#d8531e',severe:'#c0392b',critical:'#7d1a12'};

// ── Storage helpers ────────────────────────────────────────
const ls = {
  get: (k, def) => { try{ return JSON.parse(localStorage.getItem(k)??'null')??def; }catch{ return def; } },
  set: (k, v) => { try{ localStorage.setItem(k, JSON.stringify(v)); }catch{} },
  rm:  (k) => { try{ localStorage.removeItem(k); }catch{} },
};

function session(){
  try{
    const jwt = localStorage.getItem('vigilo_jwt');
    if(!jwt) return null;
    const p = JSON.parse(atob(jwt.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    if(p.exp && p.exp < Date.now()/1000){ ls.rm('vigilo_jwt'); return null; }
    return p;
  }catch{ return null; }
}

function isPro(s){ return s && s.plan === 'pro'; }
function isB2B(s){ return s && (s.b2b_role === 'b2b_admin' || s.b2b_role === 'b2b_employee'); }

function fmtDate(d){ try{ return new Date(d).toLocaleDateString('en-GB',{year:'numeric',month:'short',day:'numeric'}); }catch{ return '—'; } }
function esc(s){ return String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function countryName(iso){ return COUNTRY_NAMES[iso] || iso; }
// Render a country chip — show the ISO badge only when iso != name
// (fixes "United States United States" when watched list stores full names)
function countryChip(iso){
  const name = countryName(iso);
  const showIso = String(iso).length <= 3 && iso !== name;
  return `<span class="chip">${esc(name)}${showIso?` <span style="font-size:10px;opacity:.6">${esc(iso)}</span>`:''}</span>`;
}

// ── Icons ──────────────────────────────────────────────────
const IC = {
  overview: '<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>',
  api: '<path d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>',
  webhooks: '<path d="M13 10V3L4 14h7v7l9-11h-7z"/>',
  reports: '<path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>',
  team: '<path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>',
  billing: '<rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>',
  usage: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
  globe: '<path d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>',
  logout: '<path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>',
  copy: '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>',
  check: '<polyline points="20 6 9 11 4 16"/>',
  trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/>',
  plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  link: '<path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>',
  bell: '<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>',
};
function ico(name, size=16){ return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${IC[name]||''}</svg>`; }

// ── Current tab state ──────────────────────────────────────
let TAB = 'overview';

function setTab(t){ TAB = t; renderMain(); }

// ── Sidebar ────────────────────────────────────────────────
function renderSidebar(sess){
  const tabs = [
    { id:'overview', label:'Overview' },
    { id:'api', label:'API Key' },
    { id:'webhooks', label:'Webhooks' },
    { id:'reports', label:'Reports' },
    { id:'billing', label:'Billing' },
  ];
  if(isB2B(sess)) tabs.push({ id:'team', label:'Team' });

  const email = sess?.email || '—';
  const initials = email[0]?.toUpperCase() || '?';

  return `<aside class="sidebar">
    <div class="sb-brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#E8590C"/><path d="M7.5 8 L14 20 L20.5 8" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Vigilo
    </div>
    <nav class="sb-nav">
      <div class="sb-sec">Dashboard</div>
      ${tabs.map(t => `
        <button class="sb-item${TAB===t.id?' active':''}" onclick="window._tab('${t.id}')">
          ${ico(t.id,15)} ${t.label}
        </button>`).join('')}
      <div class="sb-sec">Tools</div>
      <a class="sb-item" href="/app.html">${ico('globe',15)} Live globe</a>
      <a class="sb-item" href="/report?country=${ls.get('vigilo_watched',[])[0]||'TR'}">${ico('reports',15)} View report</a>
    </nav>
    <div class="sb-foot">
      <div class="sb-user">
        <b>${esc(email)}</b>
        ${isPro(sess)?'<span style="color:var(--amber);font-size:11px">✦ PRO</span>':'<span style="font-size:11px">Free plan</span>'}
        ${isB2B(sess)?`<span style="font-size:11px;color:var(--amber)">${sess.b2b_role==='b2b_admin'?'Admin':'Employee'}</span>`:''}
      </div>
      <button class="btn-out" onclick="window._logout()">
        ${ico('logout',13)} Sign out
      </button>
    </div>
  </aside>`;
}

// ── OVERVIEW TAB ───────────────────────────────────────────
function renderOverview(sess){
  const assessLeft = ls.get('vigilo_assess_left', FREE_ASSESS);
  const watched = ls.get('vigilo_watched', []);
  const assessPct = Math.round((assessLeft / FREE_ASSESS) * 100);
  const watchPct = Math.round((watched.length / FREE_COUNTRIES) * 100);

  const watchedChips = watched.length
    ? watched.map(iso => countryChip(iso)).join('')
    : '<span style="color:var(--ink500);font-size:13px">No countries watched yet</span>';

  const recentReports = ls.get('vigilo_reports', []).slice(-5).reverse();
  const actHtml = recentReports.length

const TAB_TITLES = { overview:'Overview', api:'API Key', webhooks:'Webhooks', reports:'Reports', billing:'Billing & usage', team:'Team' };

function renderMain(){
  const sess = session();
  const main = document.getElementById('mainContent');
  if(!main) return;

  document.getElementById('mainTitle').textContent = TAB_TITLES[TAB] || TAB;

  // Update sidebar active states
  document.querySelectorAll('.sb-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick') === `window._tab('${TAB}')`);
  });

  let content = '';
  if(TAB === 'overview') content = renderOverview(sess);
  else if(TAB === 'api') content = renderApi(sess);
  else if(TAB === 'webhooks') content = renderWebhooks();
  else if(TAB === 'reports') content = renderReports();
  else if(TAB === 'billing') content = renderBilling(sess);
  else if(TAB === 'team') content = renderTeam(sess);
  main.innerHTML = content;
}

      <p style="font-size:12.5px;color:var(--ink500);margin-top:14px;line-height:1.55">
        Approaching your limit? <a href="mailto:alex@vigilo.cc?subject=Vigilo%20%E2%80%94%20upgrade%20request" style="color:var(--amber)">Email us</a> for an upgrade — no friction, no auto-charge.
      </p>
    </div>
  `;
}

// ── Auth view ──────────────────────────────────────────────
function renderAuth(){
  document.getElementById('appRoot').innerHTML = `
    <div class="auth-wrap">
      <div class="auth-box">
        <div class="auth-logo">
          <svg width="32" height="32" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#E8590C"/><path d="M7.5 8 L14 20 L20.5 8" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Vigilo
        </div>
        <h2>Sign in to your account</h2>
        <p>Enter your email — we'll send a one-time login link. No password needed.</p>
        <input class="auth-input" id="authEmail" type="email" placeholder="you@email.com" autocomplete="email">
        <button class="auth-btn" id="authBtn" onclick="window._sendLink()">Send login link</button>
        <div class="auth-msg" id="authMsg"></div>
        <div class="auth-back"><a href="/app.html">← Back to the globe</a></div>
      </div>
    </div>`;
}

// ── Full dashboard ─────────────────────────────────────────
function renderDashboard(sess){
  document.getElementById('appRoot').innerHTML = `
    <div class="shell">
      ${renderSidebar(sess)}
      <div class="main" id="mainPanel">
        <div class="main-hd">
          <h1 id="mainTitle">${TAB_TITLES[TAB]}</h1>
          <a class="btn btn-ghost btn-sm" href="/app.html">${ico('globe',14)} Open globe</a>
        </div>
        <div class="main-body" id="mainContent"></div>
      </div>
    </div>`;
  renderMain();
}

// ── Global handlers ────────────────────────────────────────
window._tab = (t) => { TAB = t; renderMain(); };
window._logout = () => { ls.rm('vigilo_jwt'); location.reload(); };
window._repType = (t) => {
  REP_TYPE = t;
  document.querySelectorAll('.rep-card').forEach(c => c.classList.toggle('selected', c.querySelector('input').value === t));
};

window._toggleKey = () => {
  const disp = document.getElementById('keyDisp');
  const btn = document.getElementById('keyToggle');
  const key = ls.get('vigilo_api_key','');
  if(btn.textContent === 'Show'){ disp.textContent = key; btn.textContent = 'Hide'; }
  else{
    const masked = key.slice(0,12) + '••••••••••••' + key.slice(-6);
    disp.textContent = masked; btn.textContent = 'Show';
  }
};
window._copyKey = () => {
  const key = ls.get('vigilo_api_key','');
  if(!key) return;
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.getElementById('keyCopy');
    btn.textContent = 'Copied!'; btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 2000);
  });
};

window._testApi = async () => {
  const iso = (document.getElementById('testIso')?.value||'').trim().toUpperCase();
  const out = document.getElementById('testOut');
  if(!/^[A-Z]{2}$/.test(iso)){ out.style.display='block'; out.textContent='Enter a 2-letter ISO country code.'; return; }
  out.style.display = 'block'; out.textContent = 'Fetching…';
  try{
    const apiKey = ls.get('vigilo_api_key','');
    const headers = apiKey ? {'X-Api-Key': apiKey} : {};
    const r = await fetch(`/api/v1/risk?country=${iso}&history_days=7`, { headers });
    const d = await r.json();
    out.textContent = JSON.stringify(d, null, 2).slice(0, 2000);
  }catch(e){ out.textContent = 'Error: ' + e; }
};

window._createWh = async () => {
  const country = (document.getElementById('whCountry')?.value||'').toUpperCase();
  const threshold = parseFloat(document.getElementById('whThreshold')?.value||'2');
  const url = document.getElementById('whUrl')?.value||'';
  const email = document.getElementById('whEmail')?.value||'';
  const msg = document.getElementById('whMsg');

  if(!/^[A-Z]{2}$/.test(country)){ msg.innerHTML='<div class="msg msg-err">Enter a valid 2-letter country code.</div>'; return; }
  if(!url.startsWith('https://')){ msg.innerHTML='<div class="msg msg-err">Callback URL must be HTTPS.</div>'; return; }

  msg.innerHTML='<div class="msg" style="color:var(--ink500)">Registering…</div>';
  try{
    const r = await fetch('/api/v1/risk/webhooks', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ country, threshold, callback_url: url, email: email||undefined }),
    });
    const d = await r.json();
    if(!r.ok){ msg.innerHTML=`<div class="msg msg-err">${esc(d.error||'Error')}</div>`; return; }
    WEBHOOKS.unshift({ id: d.id, manage_token: d.manage_token, secret: d.secret, country, threshold, callback_url: url, created_at: new Date().toISOString() });
    ls.set('vigilo_webhooks', WEBHOOKS);
    msg.innerHTML=`<div class="msg msg-ok">Webhook registered! ID: ${esc(d.id)} · Secret saved locally.</div>`;
    document.getElementById('whCountry').value='';
    document.getElementById('whUrl').value='';
  }catch(e){ msg.innerHTML=`<div class="msg msg-err">Network error: ${esc(String(e))}</div>`; }
};

window._deleteWh = async (idx) => {
  const wh = WEBHOOKS[idx];
  if(!wh) return;
  if(!confirm(`Delete webhook ${wh.id}?`)) return;
  try{
    await fetch(`/api/v1/risk/webhooks?id=${encodeURIComponent(wh.id)}&manage_token=${encodeURIComponent(wh.manage_token)}`, { method:'DELETE' });
  }catch{}
  WEBHOOKS.splice(idx, 1);
  ls.set('vigilo_webhooks', WEBHOOKS);
  renderMain();
};

window._generateReport = () => {
  const iso = (document.getElementById('repCountry')?.value||REP_COUNTRY).trim().toUpperCase();
  const msg = document.getElementById('repMsg');
  if(!/^[A-Z]{2}$/.test(iso)){ if(msg) msg.textContent = 'Enter a valid country code.'; return; }
  const reports = ls.get('vigilo_reports', []);
  reports.push({ type: REP_TYPE, country: iso, date: new Date().toISOString() });
  ls.set('vigilo_reports', reports.slice(-50));
  window.open(`/report?country=${iso}`, '_blank');
  if(msg) msg.textContent = `Opening ${countryName(iso)} report…`;
};

window._sendLink = async () => {
  const email = document.getElementById('authEmail')?.value?.trim();
  const btn = document.getElementById('authBtn');
  const msg = document.getElementById('authMsg');
  if(!email?.includes('@')){ if(msg) msg.textContent='Enter a valid email.'; return; }
  btn.disabled=true; btn.style.opacity='.6'; btn.textContent='Sending…';
  try{
    await fetch('/api/magic-link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,lang:'en'})});
    if(msg){ msg.textContent='✓ Check your email for the login link.'; msg.style.color='var(--green)'; }
    btn.style.display='none';
  }catch{
    btn.disabled=false; btn.style.opacity='1'; btn.textContent='Send login link';
    if(msg) msg.textContent='Error. Please try again.';
  }
};

window._invite = async () => {
  const email = document.getElementById('inviteEmail')?.value?.trim();
  const msg = document.getElementById('inviteMsg');
  if(!email?.includes('@')){ msg.innerHTML='<div class="msg msg-err">Enter a valid email.</div>'; return; }
  msg.innerHTML='<div class="msg" style="color:var(--ink500)">Sending invite…</div>';
  try{
    await fetch('/api/magic-link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,role:'b2b_employee',lang:'en'})});
    msg.innerHTML='<div class="msg msg-ok">Invite sent to '+esc(email)+'</div>';
    document.getElementById('inviteEmail').value='';
  }catch{
    msg.innerHTML='<div class="msg msg-err">Could not send invite. Try again.</div>';
  }
};

// ── Boot ───────────────────────────────────────────────────
function boot(){
  const sess = session();
  if(!sess) renderAuth();
  else renderDashboard(sess);
}
boot();

})();
</script>

<!-- ─────────────── ONBOARDING TOUR ─────────────── -->
<script>
(function(){
  var DONE_KEY = 'vigilo_onboarding_done';
  if(localStorage.getItem(DONE_KEY)) return;

  var STEPS = [
    {
      title: 'Welcome to Vigilo',
      desc: "You're all set. Here's a 30-second tour of your dashboard.",
      icon: '👋',
      target: null
    },
    {
      title: 'Your overview',
      desc: 'Check watched countries, remaining risk assessments, and your recent report history.',
      icon: '📊',
      sel: function(){ return document.querySelectorAll('.sb-nav .sb-item')[0]; }
    },
    {
      title: 'API access',
      desc: 'Copy your API key and run live test requests to the risk endpoint directly here.',
      icon: '🔑',
      sel: function(){ return document.querySelectorAll('.sb-nav .sb-item')[1]; }
    },
    {
      title: 'Webhooks',
      desc: 'Get notified the moment risk rises in a country. Set threshold, paste your URL — done.',
      icon: '🔔',
      sel: function(){ return document.querySelectorAll('.sb-nav .sb-item')[2]; }
    },
    {
      title: 'PDF reports',
      desc: 'Generate a print-ready risk briefing for any country in one click.',
      icon: '📄',
      sel: function(){ return document.querySelectorAll('.sb-nav .sb-item')[3]; }
    }
  ];

  var step = 0;
  var ring, tip, backdrop;

  function mkEl(tag, css){
    var e = document.createElement(tag);
    e.style.cssText = css;
    return e;
  }

  function init(){
    backdrop = mkEl('div',
      'position:fixed;inset:0;z-index:9980;background:rgba(13,16,21,0);pointer-events:all;transition:background .25s');
    backdrop.addEventListener('click', function(ev){ ev.stopPropagation(); });
    document.body.appendChild(backdrop);

    ring = mkEl('div',
      'position:fixed;z-index:9992;box-sizing:border-box;border-radius:12px;pointer-events:none;' +
      'border:2px solid #E8590C;opacity:0;transition:all .25s cubic-bezier(.4,0,.2,1)');
    document.body.appendChild(ring);

    tip = mkEl('div',
      'position:fixed;z-index:10000;width:288px;background:#fff;border-radius:18px;' +
      'padding:24px 22px 18px;' +
      'box-shadow:0 20px 60px rgba(13,16,21,.28),0 0 0 1px rgba(13,16,21,.07);' +
      "font-family:'Geist',ui-sans-serif,system-ui,-apple-system,sans-serif;" +
      '-webkit-font-smoothing:antialiased;opacity:0;transition:opacity .2s,top .25s,left .25s,transform .25s');
    document.body.appendChild(tip);

    show(0);
  }

  function dots(){
    return STEPS.map(function(_,i){
      return '<span style="display:inline-block;width:' + (i===step?'16':'6') + 'px;height:6px;border-radius:3px;' +
        'background:' + (i===step?'#E8590C':'rgba(20,17,12,.15)') + ';transition:all .2s"></span>';
    }).join('');
  }

  function show(idx){
    step = idx;
    var s = STEPS[idx];
    var isLast = idx === STEPS.length - 1;
    var el = s.sel ? s.sel() : null;
    var PAD = 7;

    tip.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">' +
        '<div style="display:flex;gap:5px;align-items:center">' + dots() + '</div>' +
        '<button onclick="window._onbSkip()" style="background:none;border:none;cursor:pointer;' +
          'color:#9F9685;font-size:22px;line-height:1;padding:0 2px;font-family:inherit" title="Skip tour">×</button>' +
      '</div>' +
      '<div style="font-size:24px;margin-bottom:10px">' + s.icon + '</div>' +
      '<div style="font-size:16px;font-weight:700;letter-spacing:-.025em;color:#14110C;line-height:1.25;margin-bottom:8px">' + s.title + '</div>' +
      '<p style="font-size:13.5px;color:#544D42;line-height:1.65;margin:0 0 20px">' + s.desc + '</p>' +
      '<div style="display:flex;align-items:center;justify-content:space-between">' +
        '<span style="font-size:12px;color:#9F9685">' + (idx+1) + ' / ' + STEPS.length + '</span>' +
        '<div style="display:flex;gap:8px">' +
          (idx > 0 ? '<button onclick="window._onbPrev()" style="background:none;border:1.5px solid rgba(20,17,12,.14);border-radius:9px;padding:8px 15px;cursor:pointer;font-size:13px;color:#7A7263;font-family:inherit;font-weight:600">← Back</button>' : '') +
          '<button onclick="window._onbNext()" style="background:#E8590C;border:none;border-radius:9px;padding:8px 20px;cursor:pointer;font-size:13px;color:#fff;font-family:inherit;font-weight:700">' +
            (isLast ? 'Done ✓' : 'Next →') +
          '</button>' +
        '</div>' +
      '</div>';

    if(!el){
      // centered welcome card
      backdrop.style.background = 'rgba(13,16,21,0.55)';
      ring.style.opacity = '0';
      ring.style.boxShadow = '';

      tip.style.top = '50%';
      tip.style.left = '50%';
      tip.style.transform = 'translate(-50%,-50%)';
      tip.style.opacity = '1';
    } else {
      backdrop.style.background = 'rgba(13,16,21,0)';

      var r = el.getBoundingClientRect();
      ring.style.top    = (r.top  - PAD) + 'px';
      ring.style.left   = (r.left - PAD) + 'px';
      ring.style.width  = (r.width  + PAD*2) + 'px';
      ring.style.height = (r.height + PAD*2) + 'px';
      ring.style.boxShadow = '0 0 0 4000px rgba(13,16,21,0.6)';
      ring.style.opacity = '1';

      // position tooltip
      var tipW = 288, tipH = 220, gap = 18;
      var top, left;

      // try right of element
      left = r.right + PAD + gap;
      top  = r.top + (r.height/2) - (tipH/2);
      if(left + tipW > window.innerWidth - 12){
        left = r.left - PAD - gap - tipW;
      }
      top  = Math.max(12, Math.min(top, window.innerHeight - tipH - 12));
      left = Math.max(12, Math.min(left, window.innerWidth  - tipW - 12));

      tip.style.transform = '';
      tip.style.top  = top  + 'px';
      tip.style.left = left + 'px';
      tip.style.opacity = '1';
    }
  }

  window._onbNext = function(){
    if(step >= STEPS.length - 1){ window._onbSkip(); return; }
    show(step + 1);
  };
  window._onbPrev = function(){
    if(step > 0) show(step - 1);
  };
  window._onbSkip = function(){
    localStorage.setItem(DONE_KEY, '1');
    [ring, tip, backdrop].forEach(function(e){ if(e && e.parentNode) e.parentNode.removeChild(e); });
    delete window._onbNext; delete window._onbPrev; delete window._onbSkip;
  };

  // Only start tour when dashboard (sidebar) is actually rendered — not on auth screen
  var wait = 0;
  var check = setInterval(function(){
    wait += 50;
    if(document.querySelector('.sb-nav')){
      clearInterval(check);
      setTimeout(init, 500);
    } else if(wait > 4000){
      clearInterval(check); // user not logged in — skip tour
    }
  }, 50);
})();
</script>
