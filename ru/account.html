<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Мой профиль · Vigilo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <style>
    :root{ color-scheme:light;
      --bg:#F4F2EE; --card:#fff; --ink:#0F0E0C; --ink2:#3B3A36;
      --muted:#807E76; --muted2:#B6B3AA; --line:#ECEAE2; --accent:#E8590C; --gold:#F5A623; --ok:#19A463; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
      color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;padding:32px 18px}
    .wrap{max-width:600px;margin:0 auto}
    .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
    .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
    .badge{width:28px;height:28px;border-radius:8px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:800;font-size:14px}
    .back{font-size:13px;color:var(--muted);text-decoration:none;font-weight:600}
    .back:hover{color:var(--accent)}
    h1{font-size:25px;font-weight:800;letter-spacing:-.03em;margin-bottom:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;margin-bottom:14px}
    .card h2{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
    .row:last-child{border-bottom:0}
    .row .k{color:var(--muted)}
    .row .v{font-weight:600;text-align:right;word-break:break-word}
    .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;padding:3px 11px;border-radius:999px}
    .pill.free{background:#F0EFEA;color:var(--muted)}
    .pill.pro{background:linear-gradient(180deg,var(--gold),#E8930C);color:#fff}
    .btn{display:block;width:100%;text-align:center;height:46px;line-height:46px;border:0;border-radius:12px;
      font:inherit;font-size:14.5px;font-weight:700;cursor:pointer;text-decoration:none}
    .btn.up{background:linear-gradient(180deg,var(--accent),#C92A2A);color:#fff;box-shadow:0 6px 16px -7px rgba(201,42,42,.55)}
    .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
    .btn.ghost:hover{border-color:var(--muted2)}
    .upsell{font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:14px}
    .upsell b{color:var(--ink)}
    .feat{font-size:12.5px;color:var(--ink2);display:flex;gap:8px;margin:5px 0}
    .feat .c{color:var(--ok);font-weight:800}
    .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
    .chip{font-size:12px;font-weight:600;background:#F4F2EC;border:1px solid var(--line);border-radius:999px;padding:4px 11px}
    .empty{font-size:13px;color:var(--muted);padding:14px 0;text-align:center;line-height:1.6}
    .auth input{width:100%;height:46px;padding:0 14px;border:1.5px solid var(--line);border-radius:12px;
      font:inherit;font-size:14.5px;background:#FAFAF8;outline:none;margin-bottom:9px}
    .msg{font-size:12.5px;margin-top:9px;min-height:16px;text-align:center}
    .sub-note{font-size:11px;color:var(--muted);margin-top:9px;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="brand" href="/ru/app.html"><span class="badge">V</span> Vigilo</a>
      <a class="back" href="/ru/app.html">← Назад к карте</a>
    </div>
    <h1 id="hTitle">Мой профиль</h1>
    <div id="root"></div>
  </div>

<script>
const LANG='ru', APP='/ru/', API='';
const T=(en,ru)=>LANG==='ru'?ru:en;

function session(){
  try{
    const jwt=localStorage.getItem('vigilo_jwt'); if(!jwt) return null;
    const p=JSON.parse(atob(jwt.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    if(p.exp && p.exp < Date.now()/1000){ localStorage.removeItem('vigilo_jwt'); return null; }
    return p;
  }catch{ return null; }
}
function isPaid(s){ return s && s.plan==='pro' && (!s.paid_until || new Date(s.paid_until)>new Date()); }
function fmtDate(d){ try{ return new Date(d).toLocaleDateString(LANG,{year:'numeric',month:'short',day:'numeric'}); }catch{ return d||'—'; } }

async function joinWaitlist(email,btn){
  btn.disabled=true; btn.style.opacity=.6; btn.textContent=T('Sending…','Отправляю…');
  try{ await fetch('/api/waitlist',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email,source:'account_upgrade',lang:LANG})}); }catch(e){}
  btn.textContent=T('✓ You’re on the list','✓ Ты в списке'); btn.style.background='#19A463';
}

function loggedOutView(){
  return `<div class="card auth">
    <h2>${T('Sign in','Вход')}</h2>
    <p style="font-size:13.5px;color:var(--ink2);margin-bottom:14px">${T('Enter your email — we’ll send a one-time login link. No password.','Введи email — пришлём одноразовую ссылку для входа. Без пароля.')}</p>
    <input id="em" type="email" placeholder="${T('your@email.com','ваш@email.com')}" autocomplete="email">
    <button class="btn up" id="sendBtn">${T('Send login link','Прислать ссылку')}</button>
    <div style="font-size:11.5px;color:var(--ink2);line-height:1.5;margin-top:12px">${T('By continuing, you agree to our <a href="/ru/privacy.html" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">Privacy Policy</a>.','Продолжая, вы соглашаетесь с <a href="/ru/privacy.html" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">Политикой конфиденциальности</a>.')}</div>
    <div class="msg" id="msg"></div>
  </div>`;
}

async function loggedInView(s){
  const pro=isPaid(s);
  const planPill=pro?`<span class="pill pro">✦ PRO</span>`:`<span class="pill free">${T('Free','Бесплатный')}</span>`;

  // alerts
  let alertsHtml=`<div class="empty">${T('Loading…','Загрузка…')}</div>`;
  try{
    const r=await fetch('/api/my-countries',{headers:{Authorization:'Bearer '+localStorage.getItem('vigilo_jwt')}});
    if(r.ok){
      const d=await r.json();
      const cs=d.countries||[];
      alertsHtml = cs.length
        ? `<div class="chips">${cs.map(c=>`<span class="chip">${c}</span>`).join('')}</div>
           <div class="sub-note">${cs.length} / ${d.limit} ${T('countries watched','стран отслеживается')}</div>`
        : `<div class="empty">${T('No watched countries yet. Open the map and tap “Watch” on a country.','Пока нет отслеживаемых стран. Открой карту и нажми «Следить» на стране.')}</div>`;
    } else alertsHtml=`<div class="empty">${T('Could not load alerts.','Не удалось загрузить алерты.')}</div>`;
  }catch(e){ alertsHtml=`<div class="empty">${T('Could not load alerts.','Не удалось загрузить алерты.')}</div>`; }

  const subCard = pro
    ? `<div class="card">
        <h2>${T('Subscription','Подписка')}</h2>
        <div class="row"><span class="k">${T('Plan','Тариф')}</span><span class="v">${planPill}</span></div>
        <div class="row"><span class="k">${T('Status','Статус')}</span><span class="v" style="color:var(--ok)">${T('Active','Активен')}</span></div>
        <div class="row"><span class="k">${T('Renews / valid until','Действует до')}</span><span class="v">${s.paid_until?fmtDate(s.paid_until):T('∞','бессрочно')}</span></div>
      </div>`
    : `<div class="card">
        <h2>${T('Upgrade to Pro','Перейти на Pro')}</h2>
        <div class="upsell"><b>$4.99/${T('mo','мес')}</b> · ${T('Launching soon — join the waitlist for <b>50% off</b> at launch.','Запускаем скоро — в список ожидания за <b>−50%</b> на старте.')}</div>
        <div class="feat"><span class="c">✓</span>${T('Unlimited watched countries','Безлимит стран')}</div>
        <div class="feat"><span class="c">✓</span>${T('Real-time alerts (no 24h delay)','Алерты в реальном времени')}</div>
        <div class="feat"><span class="c">✓</span>${T('Full History tab + charts','Полная вкладка История + графики')}</div>
        <div class="feat"><span class="c">✓</span>${T('Risk reports (PDF)','Отчёты по рискам (PDF)')}</div>
        <div style="height:14px"></div>
        <button class="btn up" id="upBtn">${T('Join the waitlist','В список ожидания')}</button>
      </div>`;

  return `
    <div class="card">
      <h2>${T('Account','Аккаунт')}</h2>
      <div class="row"><span class="k">Email</span><span class="v">${s.email}</span></div>
      <div class="row"><span class="k">${T('Plan','Тариф')}</span><span class="v">${planPill}</span></div>
      <div class="row"><span class="k">${T('Member since','С нами с')}</span><span class="v">${s.iat?fmtDate(s.iat*1000):'—'}</span></div>
    </div>
    ${subCard}
    <div class="card">
      <h2>${T('My alerts','Мои алерты')}</h2>
      ${alertsHtml}
      <div style="height:14px"></div>
      <a class="btn ghost" href="/ru/app.html">${T('Manage on the map →','Управлять на карте →')}</a>
    </div>
    <div class="card">
      <h2>${T('Report history','История отчётов')}</h2>
      <div class="empty">${T('Risk reports appear here once generated. “Assess risks” on any country to create one (Pro).','Отчёты по рискам появятся здесь после создания. Нажми «Оценить риски» на любой стране (Pro).')}</div>
    </div>
    <div class="card">
      <button class="btn ghost" id="outBtn">${T('Sign out','Выйти')}</button>
    </div>`;
}

async function render(){
  const s=session();
  const root=document.getElementById('root');
  if(!s){ root.innerHTML=loggedOutView();
    const btn=document.getElementById('sendBtn'), em=document.getElementById('em'), msg=document.getElementById('msg');
    btn.onclick=async()=>{
      if(!em.value.includes('@')) return;
      btn.disabled=true; btn.style.opacity=.6;
      try{ await fetch('/api/magic-link',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:em.value.trim(),lang:LANG})});
        msg.textContent=T('Check your email ✓','Проверь почту ✓'); msg.style.color='#19A463'; em.disabled=true; btn.style.display='none';
      }catch{ msg.textContent=T('Error. Try again.','Ошибка. Повтори.'); btn.disabled=false; btn.style.opacity=1; }
    };
    return;
  }
  root.innerHTML=await loggedInView(s);
  const out=document.getElementById('outBtn');
  if(out) out.onclick=()=>{ localStorage.removeItem('vigilo_jwt'); location.href='/ru/'; };
  const up=document.getElementById('upBtn');
  if(up) up.onclick=()=>joinWaitlist(s.email,up);
}
render();
</script>

</body>
</html>
