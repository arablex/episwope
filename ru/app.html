<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vigilo</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://vigilo.cc/app.html?lang=ru">
<script>
  /* ── Unified app: the Russian fork was retired. ──
     /ru/app.html now forwards to the single source-of-truth app
     (/app.html) with the Russian locale, preserving query + hash.
     This guarantees RU users always get current features. */
  (function(){
    try { localStorage.setItem('vigilo_lang', 'ru'); } catch(e){}
    var s = location.search || '';
    var qp = s ? (s + '&lang=ru') : '?lang=ru';
    location.replace('/app.html' + qp + (location.hash || ''));
  })();
</script>
</head>
<body>
<noscript><meta http-equiv="refresh" content="0; url=/app.html?lang=ru"></noscript>
<p style="font:14px/1.5 system-ui,sans-serif;color:#555;padding:24px">
  Перенаправление… <a href="/app.html?lang=ru">Открыть Vigilo</a>
</p>
</body>
</html>
