<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#161513"/>
  <!-- globe base -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#E8590C" stroke-width="12"/>
  <!-- latitude lines -->
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="#E8590C" stroke-width="6" opacity="0.5"/>
  <!-- longitude line -->
  <line x1="256" y1="96" x2="256" y2="416" stroke="#E8590C" stroke-width="6" opacity="0.5"/>
  <!-- horizontal axis -->
  <line x1="96" y1="256" x2="416" y2="256" stroke="#E8590C" stroke-width="6" opacity="0.5"/>
  <!-- alert dot — DRC area -->
  <circle cx="280" cy="290" r="18" fill="#C92A2A"/>
  <circle cx="280" cy="290" r="28" fill="#C92A2A" opacity="0.25"/>
  <!-- alert dot — Brazil -->
  <circle cx="190" cy="300" r="12" fill="#E8590C"/>
  <circle cx="190" cy="300" r="20" fill="#E8590C" opacity="0.20"/>
  <!-- small dot — SE Asia -->
  <circle cx="360" cy="270" r="8" fill="#E4B514"/>
</svg>
