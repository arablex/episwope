[build]
  publish = "."
  command = ""   # static site, no build step

# Service worker must never be cached — browser needs fresh version check
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache headers for static assets
[[headers]]
  for = "/public/*"
  [headers.values]
    Cache-Control = "public, max-age=1800, stale-while-revalidate=3600"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"


[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Env vars (set in Netlify UI → Site Configuration → Environment variables):
#
# Auth & payments:
#   JWT_SECRET             — ≥32 random chars, signs magic-link tokens
#   STRIPE_SECRET_KEY      — sk_live_... or sk_test_...
#   STRIPE_WEBHOOK_SECRET  — whsec_... from Netlify webhook endpoint
#   STRIPE_PRICE_ID        — price_... for the $9/mo Pro plan
#
# Push notifications (VAPID):
#   VAPID_PUBLIC_KEY       — npx web-push generate-vapid-keys
#   VAPID_PRIVATE_KEY      — same command above
#
# Telegram Bot (@vigilocc_bot):
#   TELEGRAM_BOT_TOKEN     — from @BotFather (set via: setWebhook after deploy)
#   INTERNAL_SECRET        — ≥32 random chars, authenticates GitHub→Netlify calls
#
# Also add to GitHub repo Secrets (Settings → Secrets → Actions):
#   TELEGRAM_BOT_TOKEN, INTERNAL_SECRET, GROQ_API_KEY, GEMINI_API_KEY

# Root — serve new consumer landing instead of legacy index.html
[[redirects]]
  from = "/"
  to = "/consumer.html"
  status = 200

