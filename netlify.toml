[build]
  publish = "."
  command = ""   # static site, no build step

# Service worker must never be cached — browser needs fresh version check
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache headers for static assets
[[headers]]
  for = "/public/*"
  [headers.values]
    Cache-Control = "public, max-age=1800, stale-while-revalidate=3600"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"


[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Env vars needed for monetization (set in Netlify UI → Environment variables):
#   JWT_SECRET             — ≥32 random chars, signs magic-link tokens
#   STRIPE_SECRET_KEY      — sk_live_... or sk_test_...
#   STRIPE_WEBHOOK_SECRET  — whsec_... from Netlify webhook endpoint
#   STRIPE_PRICE_ID        — price_... for the $9/mo Pro plan

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
