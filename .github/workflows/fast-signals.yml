name: Fast Signals — Early Warning Engine

on:
  schedule:
    # Every 15 minutes — GitHub Actions minimum recommended interval
    # Note: actual firing may lag 1-5 min under load
    - cron: "*/15 * * * *"
  workflow_dispatch:   # manual trigger from GitHub UI

permissions:
  contents: write    # needed to commit signals.json back to repo

jobs:
  detect:
    runs-on: ubuntu-latest
    # Was 8 min — too short for the full chain (fast_signals + climate +
    # risk_aggregate + forecast + osint + commit). fast_signals.py alone ate
    # the whole budget, the job was killed at the limit (every run = "cancelled
    # @ 8m18s"), and the COMMIT STEP NEVER RAN — so risk_index.json froze for
    # days while every code fix deployed but never regenerated. Raised to 25.
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fast signals engine
        # Per-step cap so a slow/hung source can't starve the downstream risk
        # aggregator + commit; continue-on-error so the chain always reaches
        # the commit step even if the health engine degrades.
        timeout-minutes: 14
        continue-on-error: true
        env:
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_IDS:   ${{ secrets.TELEGRAM_ADMIN_CHAT_IDS }}
          INTERNAL_SECRET:           ${{ secrets.INTERNAL_SECRET }}
        run: python3 scripts/fast_signals.py

      - name: Run climate leading-indicator model
        # Must run BEFORE risk_aggregate (it ingests climate_risk.json)
        run: python3 scripts/climate_signals.py
        continue-on-error: true   # never block on the climate feed

      - name: Run B2B risk aggregator
        # Must run AFTER fast_signals (signals.json) + climate_signals
        run: python3 scripts/risk_aggregate.py
        continue-on-error: true   # never block the health engine on risk feed

      - name: Run 7-day projection + history accrual
        # Must run AFTER risk_aggregate (reads risk_index.json + climate_risk.json)
        run: python3 scripts/forecast.py
        continue-on-error: true

      - name: Run agentic OSINT investigator
        # Must run AFTER risk_aggregate (seeds from risk_events.json)
        run: python3 scripts/osint_agent.py
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Compute World Pulse
        # Must run AFTER risk_aggregate (reads risk_index.json + risk_history.json)
        run: python3 scripts/world_pulse.py
        continue-on-error: true

      - name: Compute lead-time receipts
        # Reads signals_history.json (written by fast_signals.py above)
        run: python3 scripts/receipts.py
        continue-on-error: true

      - name: Commit signals if changed
        if: always()   # commit whatever regenerated, even if a prior step failed
        run: |
          git config user.name  "Vigilo Signals Bot"
          git config user.email "signals@vigilo.noreply"
          git add public/signals.json public/signals_history.json public/opensky_baseline.json public/ncbi_baseline.json public/risk_index.json public/risk_events.json public/climate_risk.json public/climate_baseline.json public/forecast.json public/risk_history.json public/osint_dossiers.json public/pulse.json public/pulse_history.json public/receipts.json || true
          if git diff --cached --quiet; then
            echo "No signal changes — skipping commit"
          else
            git commit -m "chore: update early warning signals"
            # Remote may have advanced during the ~10-min run (a human push or
            # another scheduled run). A bare push then fails and the fresh data
            # is lost. Rebase onto the latest main and retry. Bot only touches
            # data JSONs, humans touch code, so rebase replays cleanly.
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main \
                && git push && { echo "pushed (attempt $attempt)"; break; }
              echo "push attempt $attempt failed — refetching and retrying"
              sleep 5
            done
          fi

      # Push urgent/alert signals to all subscribed devices via Netlify function
      - name: Push signal notifications
        env:
          VIGILO_SITE: ${{ secrets.VIGILO_SITE_URL || 'https://vigilo.cc' }}
          EPISCOPE_TOKEN_SECRET: ${{ secrets.EPISCOPE_TOKEN_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import json, os, urllib.request, urllib.error

          site  = os.environ.get('VIGILO_SITE', 'https://vigilo.cc').rstrip('/')
          token = os.environ.get('EPISCOPE_TOKEN_SECRET', '')

          try:
              with open('public/signals.json') as f:
                  data = json.load(f)
          except Exception as e:
              print(f'Could not read signals.json: {e}')
              exit(0)

          urgent = [s for s in data.get('signals', [])
                    if s['level'] in ('urgent', 'alert') and s.get('confidence', 0) >= 0.65]

          if not urgent:
              print('No urgent/alert signals to push')
              exit(0)

          top = urgent[0]
          print(f'Pushing notification for: {top["disease"]} / {top["country"]} ({top["level"]})')

          payload = json.dumps({'signal': top}).encode()
          req = urllib.request.Request(
              f'{site}/api/signal-notify',
              data=payload,
              headers={'Content-Type': 'application/json'},
              method='POST',
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  result = json.loads(resp.read())
                  print(f'Push result: sent={result.get("sent", 0)} failed={result.get("failed", 0)}')
          except urllib.error.HTTPError as e:
              print(f'Push HTTP {e.code}: {e.read()[:200]}')
          except Exception as e:
              print(f'Push error: {e}')
          PYEOF

      # Trigger Netlify rebuild so the fresh data is served
      - name: Trigger Netlify deploy
        if: always()   # deploy even if an earlier non-critical step failed
        env:
          NETLIFY_DEPLOY_HOOK: ${{ secrets.NETLIFY_DEPLOY_HOOK }}
        run: |
          if [ -n "$NETLIFY_DEPLOY_HOOK" ]; then
            # Build hooks return an EMPTY body — do NOT pipe to json.load (that
            # crashed the step and failed the whole job even though the deploy
            # fired fine). Just POST and report the HTTP status; never fail here.
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$NETLIFY_DEPLOY_HOOK" || echo "000")
            echo "Netlify deploy hook → HTTP $code"
          else
            echo "No deploy hook configured — skipping"
          fi

      # Fire B2B risk webhooks for any subscription whose threshold was crossed
      - name: Dispatch risk webhooks
        if: success()
        env:
          VIGILO_SITE: ${{ secrets.VIGILO_SITE_URL || 'https://vigilo.cc' }}
          EPISCOPE_TOKEN_SECRET: ${{ secrets.EPISCOPE_TOKEN_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import os, urllib.request, urllib.error
          site  = os.environ.get('VIGILO_SITE', 'https://vigilo.cc').rstrip('/')
          token = os.environ.get('EPISCOPE_TOKEN_SECRET', '')
          if not token:
              print('No EPISCOPE_TOKEN_SECRET — skipping webhook dispatch'); raise SystemExit(0)
          req = urllib.request.Request(
              f'{site}/api/internal/risk-dispatch', data=b'{}', method='POST',
              headers={'Content-Type': 'application/json',
                       'Authorization': f'Bearer {token}'})
          try:
              with urllib.request.urlopen(req, timeout=25) as r:
                  print('risk-dispatch:', r.read().decode()[:300])
          except urllib.error.HTTPError as e:
              print(f'risk-dispatch HTTP {e.code}: {e.read()[:200]}')
          except Exception as e:
              print(f'risk-dispatch error: {e}')
          PYEOF
