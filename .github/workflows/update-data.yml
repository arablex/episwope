name: Update epidemiology data

on:
  schedule:
    # Every 12 hours
    - cron: "0 0,12 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write    # needed to commit JSON files back to repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fetch script
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Export subscribers
        env:
          EPISCOPE_TOKEN_SECRET: ${{ secrets.EPISCOPE_TOKEN_SECRET }}
        run: |
          curl -sf \
            -H "Authorization: Bearer ${EPISCOPE_TOKEN_SECRET}" \
            https://vigilo.cc/api/admin/export-subs \
            -o public/_subscribers.json || echo "[]" > public/_subscribers.json

      - name: Send weekly digests (Mondays only)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUBSCRIBERS_JSON: public/_subscribers.json
          EVENTS_JSON: public/events.json
        run: python3 scripts/send_digests.py

      - name: Report sent digests to Netlify
        if: success() && hashFiles('public/_digest_sent.json') != ''
        env:
          EPISCOPE_TOKEN_SECRET: ${{ secrets.EPISCOPE_TOKEN_SECRET }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${EPISCOPE_TOKEN_SECRET}" \
            -H "Content-Type: application/json" \
            --data-binary "@public/_digest_sent.json" \
            https://vigilo.cc/api/admin/update-sent

      - name: Commit data if changed
        run: |
          git config user.name  "Vigilo Bot"
          git config user.email "bot@vigilo.noreply"
          git add public/events.json public/alerts.json public/food_recalls.json public/history.json
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
          else
            # NOTE: do NOT add [skip ci] — Netlify honors it and would skip
            # the deploy, freezing prod data. This workflow is cron/dispatch
            # only (no push trigger), so there is no self-trigger loop.
            git commit -m "chore: update epidemiology data"
            # A concurrent push (e.g. fast-signals.yml) may move main forward
            # between our checkout and push. Rebase-and-retry instead of failing
            # the whole job — otherwise the alert-check step below is skipped.
            for i in 1 2 3; do
              if git push; then
                echo "push ok"
                break
              fi
              echo "push rejected — rebasing onto origin/main (attempt $i)"
              git pull --rebase --autostash origin main || true
            done
          fi

      - name: Trigger alert check
        # Run even if the commit/push step failed — the alert payload is built
        # from local files that exist regardless of whether the data committed.
        if: always()
        env:
          EPISCOPE_TOKEN_SECRET: ${{ secrets.EPISCOPE_TOKEN_SECRET }}
        run: |
          # Merge health events (events.json) + risk events (risk_events.json,
          # written by the Fast Signals workflow) so alerts cover all 7 domains,
          # not just health. Either file may be absent — be defensive.
          # Write payload to a file — the merged feed (~250+ events) is too big
          # to pass inline via -d ("Argument list too long"). Use --data @file.
          python3 -c "
          import json, os
          out = []
          for f in ('public/events.json', 'public/risk_events.json'):
              if os.path.exists(f):
                  try: out += (json.load(open(f)).get('events') or [])
                  except Exception: pass
          json.dump({'events': out}, open('/tmp/alert_payload.json','w'))
          print('payload events:', len(out))
          "
          curl -sf -X POST \
            -H "Authorization: Bearer ${EPISCOPE_TOKEN_SECRET}" \
            -H "Content-Type: application/json" \
            --data @/tmp/alert_payload.json \
            https://vigilo.cc/api/alert-check \
          || echo "⚠ alert-check failed (non-critical)"
