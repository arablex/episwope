# Mapbox public tokens (pk.*) are intentionally committed to source code.
# They are domain-restricted to https://vigilo.cc and provide read-only
# map tile access. This is standard practice for Mapbox web applications.
paths-ignore:
  - "globe.js"
  - "consumer.html"
  - "business.html"
  - "ru/consumer.html"
  - "ru/business.html"
  - "index-old.html"
